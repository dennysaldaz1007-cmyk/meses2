<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>+1 mes juntos</title>

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd54f,#ff9800,#f44336);
padding:25px;
box-sizing:border-box;

}

.caja{

background:white;
width:100%;
max-width:450px;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

h1{

font-size:30px;
color:#333;

}

p{

font-size:20px;
line-height:1.6;
color:#555;

}

button{

margin-top:25px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:#333;
color:white;

}

input{

width:90%;
padding:15px;
font-size:18px;
border-radius:15px;
border:2px solid #ddd;
margin-top:20px;

}

</style>

</head>

<body>

<div class="caja">

<h1 id="titulo"></h1>

<p id="texto"></p>

<input id="respuesta" style="display:none;">

<br>

<button id="boton" onclick="siguiente()">Siguiente</button>

</div>

<script>

const paginas=[

{

titulo:"+1 mes juntos!!",

texto:"Ya pasó un mes más, un mes más que seguimos juntos y, de verdad, no podría estar más feliz con la relación que tenemos y que seguimos construyendo juntos a pesar de todos los problemas."

},

{

titulo:"",

texto:"Y algo que, desde que te conozco, he pensado y que espero decirte lo suficiente es que: Te admiro muchísimo."

},

{

titulo:"",

texto:"Por quien eres, por lo mucho que trabajas, lo mucho que te esfuerzas, las ganas que le pones a todo lo que haces y cómo nunca te conformas. Me ENCANTA esa parte de ti."

},

{

titulo:"",

texto:"Pero esa parte también tiene un lado malo... Que a veces trabajas tanto que se te olvida algo MUY importante: TU BIENESTAR (principalmente comer y dormir)."

},

{

titulo:"",

texto:"Y sí, ya sé que vas a decir que no te da tiempo, que estabas ocupado o que se te olvidó. Pero también quiero que te cuides."

},

{

titulo:"",

texto:"Porque sí, me encanta que te esfuerces, pero también me encantaría que vivas lo suficiente para ver cuando todo tu esfuerzo dé frutos, porque si no, solo voy a ser una viuda millonaria y, la verdad, no gracias. Por eso te prometo que, así como tú te esfuerzas para que los dos podamos salir adelante y por mí, yo siempre me voy a esforzar por cuidarte. (PERO TIENES QUE DEJARME HACERLO)."

},

{

titulo:"Pregunta",

texto:"Y no puedo hacer nada por muchas cosas, pero por lo menos puedo encargarme de que comas. Pero como cada mes tengo que probar qué tan buen novio eres, adivina el restaurante. Pista: por este restaurante ha sido uno de los berrinches más grandes y ridículos que he hecho (que, en mi defensa, estaba en mis días)."

}

];

let pagina=0;

const titulo=document.getElementById("titulo");

const texto=document.getElementById("texto");

const boton=document.getElementById("boton");

const respuesta=document.getElementById("respuesta");

function mostrar(){

titulo.innerHTML=paginas[pagina].titulo;

texto.innerHTML=paginas[pagina].texto;

if(pagina===6){

respuesta.style.display="inline";

respuesta.placeholder="Escribe tu respuesta";

boton.innerHTML="Responder";

}

}

function siguiente(){

if(pagina<6){

pagina++;

mostrar();

return;

}

let r=respuesta.value.toLowerCase();

if(

r.includes("mcdonalds")

||

r.includes("mcdonald's")

||

r.includes("mcdonald")

||

r==="mc"

){

titulo.innerHTML="¡CORRECTO!";

texto.innerHTML="La respuesta era McDonald's. Qué orgullo que te acordaras, aunque qué decepción que te acuerdes más de mis berrinches que de otras cosas. Pero bueno, ya sabes, mándame a qué hora vas a estar en tu casa. (No es una sugerencia).";

}

else{

titulo.innerHTML="Qué decepción.";

texto.innerHTML="Es un momento muy icónico en nuestra relación y es muy triste que no te acuerdes. La respuesta era McDonald's. (Llores porque no me compraste un McFlurry). Pero no te preocupes, igual te voy a mandar la sorpresa (solo porque ya la programé, no porque la merezcas).";

}

respuesta.style.display="none";

boton.style.display="none";

}

mostrar();

</script>

</body>

</html>
